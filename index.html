<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d4a574">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <title>Memory Lane</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>🛤️ Memory Lane</h1>
            <button id="theme-toggle" class="btn-icon" title="Сменить тему">🌙</button>
        </div>
    </header>

    <main class="container">
        <!-- Groups List Section (Main Screen) -->
        <section id="groups-section" class="tab-content active">
            <div id="groups-list" class="groups-list"></div>
            <div class="search-bar-bottom" id="search-bar-bottom">
                <input type="text" id="groups-search" placeholder="🔍 Поиск групп...">
            </div>
        </section>

        <!-- Timeline Section (Inside Group) -->
        <section id="timeline-section" class="tab-content">
            <div class="group-header">
                <button id="back-to-groups" class="btn-back">← Назад</button>
                <h2 id="current-group-name"></h2>
            </div>
            <div class="filters">
                <input type="text" id="search-input" placeholder="🔍 Поиск...">
                <div class="filter-row">
                    <select id="category-filter">
                        <option value="">Все категории</option>
                        <option value="Travel">Путешествия</option>
                        <option value="Humor">Юмор</option>
                        <option value="Achievement">Достижения</option>
                    </select>
                    <select id="year-filter">
                        <option value="">Все годы</option>
                    </select>
                </div>
            </div>
            <div id="timeline" class="timeline"></div>
        </section>

        <!-- Members Section (Inside Group) -->
        <section id="members-section" class="tab-content">
            <div class="group-header">
                <button id="back-to-groups-members" class="btn-back">← Назад</button>
                <h2>The Legends Board</h2>
            </div>
            <div id="members-grid" class="members-grid"></div>
        </section>

        <!-- Map Section (Inside Group) -->
        <section id="map-section" class="tab-content">
            <div class="group-header">
                <button id="back-to-groups-map" class="btn-back">← Назад</button>
                <h2>Memory Map</h2>
            </div>
            <div class="map-container">
                <div id="map"></div>
                <div id="map-empty" class="map-empty" style="display: none;">
                    <div class="map-empty-icon">🗺️</div>
                    <p class="map-empty-text">Нет воспоминаний с местоположением</p>
                    <p class="map-empty-hint">Добавьте координаты при создании события</p>
                </div>
            </div>
        </section>

        <!-- Badges Section (Inside Group) -->
        <section id="badges-section" class="tab-content">
            <div class="group-header">
                <button id="back-to-groups-badges" class="btn-back">← Назад</button>
                <h2>Ачивки группы</h2>
            </div>
            <div id="badges-list" class="badges-list"></div>
        </section>
    </main>

    <!-- Modal: Add Event -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Добавить воспоминание</h2>
            <form id="event-form">
                <input type="text" id="event-title" placeholder="Заголовок" required>
                <input type="date" id="event-date" required>
                <select id="event-category" required>
                    <option value="">Выберите категорию</option>
                    <option value="Travel">Путешествия</option>
                    <option value="Humor">Юмор</option>
                    <option value="Achievement">Достижения</option>
                </select>
                <textarea id="event-description" placeholder="Описание (поддерживается Markdown)" rows="4"></textarea>

                <div class="location-picker-group" style="margin-bottom: 10px;">
                    <label style="font-weight: 500; margin-bottom: 5px; display: block;">📍 Выберите место на карте или введите адрес</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                        <input type="text" id="event-address" placeholder="Введите адрес для поиска..." style="flex: 1; min-height: 44px; margin-bottom: 0;">
                        <button type="button" id="search-address-btn" class="btn-secondary" style="width: auto; padding: 0 15px; min-height: 44px; display: flex; align-items: center; justify-content: center; margin-bottom: 0;">🔍</button>
                    </div>
                    <div id="picker-map-wrapper" class="picker-map-wrapper">
                        <button type="button" id="expand-picker-map-btn" class="expand-map-btn" title="Развернуть карту">⛶</button>
                        <div id="picker-map" class="picker-map-inner"></div>
                    </div>
                    <input type="hidden" id="event-lat">
                    <input type="hidden" id="event-lng">
                </div>
                <select id="event-author" required>
                    <option value="">Автор</option>
                </select>
                <button type="submit" class="btn-primary">Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav" id="main-nav">
        <button class="nav-btn active" data-tab="groups">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Группы</span>
        </button>
        <button class="nav-btn" data-tab="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Настройки</span>
        </button>
    </nav>

    <!-- Group Navigation (shown when inside a group) -->
    <nav class="bottom-nav" id="group-nav" style="display: none;">
        <button class="nav-btn active" data-tab="timeline">
            <span class="nav-icon">📅</span>
            <span class="nav-label">Лента</span>
        </button>
        <button class="nav-btn" data-tab="members">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Участники</span>
        </button>
        <button class="nav-btn" data-tab="map">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">Карта</span>
        </button>
        <button class="nav-btn" data-tab="badges">
            <span class="nav-icon">🏆</span>
            <span class="nav-label">Ачивки</span>
        </button>
    </nav>

    <!-- Floating Action Button (for adding new group or event) -->
    <button id="add-btn" class="fab" title="Добавить">
        <span class="fab-icon">+</span>
    </button>

    <!-- Modal: Add/Create Group -->
    <div id="group-modal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="group">&times;</span>
            <h2>Создать группу</h2>
            <form id="group-form">
                <input type="text" id="group-name" placeholder="Название группы" required>
                <textarea id="group-description" placeholder="Описание группы" rows="3"></textarea>
                <button type="submit" class="btn-primary">Создать</button>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="settings">&times;</span>
            <h2>Настройки</h2>
            <div class="settings-list">
                <button id="export-btn" class="menu-item">📥 Экспорт данных</button>
                <button id="import-btn" class="menu-item">📤 Импорт данных</button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <!-- Fullscreen Map Modal for Location Picker -->
    <div id="fullscreen-map-modal" class="modal" style="background: rgba(0,0,0,0.85); z-index: 10001;">
        <div class="modal-content" style="width: 95%; height: 90%; margin: 2% auto; max-width: 100%; padding: 10px; display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; font-size: 1rem;">Выберите место на карте</span>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="fullscreen-address-display" style="font-size: 0.85rem; color: var(--text-secondary);"></span>
                    <button id="confirm-location-btn" class="btn-primary" style="width: auto; padding: 8px 16px; font-size: 0.85rem;">Подтвердить</button>
                    <button id="close-fullscreen-map-btn" class="btn-icon" style="font-size: 1.5rem; min-width: 36px; min-height: 36px; background: transparent; border-radius: 50%; display: flex; align-items: center; justify-content: center;">&times;</button>
                </div>
            </div>
            <div id="fullscreen-picker-map" style="flex: 1; border-radius: 12px; overflow: hidden; border: 2px solid var(--border);"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
